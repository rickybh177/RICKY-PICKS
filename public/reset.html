<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Restablecer contraseña — RICKY PICKS</title>
<link rel="icon" type="image/png" href="/img/favicon.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter','Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:#16181d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
  .card{background:#fff;border:1px solid #e7ebf1;border-radius:24px;padding:34px 30px;width:100%;max-width:400px;box-shadow:0 10px 40px -18px rgba(22,24,29,.18);text-align:center}
  .card img{width:64px;height:64px;border-radius:50%;margin-bottom:14px}
  h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
  p{font-size:14px;color:#6e7787;margin-bottom:24px}
  input{width:100%;background:#f5f7fa;border:1.5px solid #e7ebf1;border-radius:14px;padding:13px 15px;color:#16181d;font-size:15px;outline:none;margin-bottom:10px;font-family:inherit}
  input:focus{border-color:#2f7bff;background:#fff}
  button{width:100%;background:#2f7bff;color:#fff;border:none;border-radius:980px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
  button:hover:not(:disabled){background:#1d4ed8}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:14px;font-size:13px;text-align:center;padding:12px;border-radius:14px;display:none}
  .msg.ok{display:block;background:rgba(22,163,74,.08);color:#16a34a}
  .msg.bad{display:block;background:rgba(220,38,38,.06);color:#dc2626}
  a{color:#2f7bff;text-decoration:none;font-size:13px;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <img src="/img/avatar.png" alt="">
  <h2>Nueva contraseña</h2>
  <p>Escribe tu nueva contraseña para acceder a RICKY PICKS.</p>
  <input type="password" id="pass1" placeholder="Nueva contraseña" autocomplete="new-password">
  <input type="password" id="pass2" placeholder="Confirmar contraseña" autocomplete="new-password">
  <button id="btn">Guardar contraseña</button>
  <div class="msg" id="msg"></div>
  <div style="text-align:center;margin-top:20px"><a href="/">← Volver al inicio</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://juzfncioexyerhwweaui.supabase.co';
const SUPA_KEY = 'sb_publishable_9l3PIKomRJ5nQF3nXPXkgQ_0Osam0vj';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

function showMsg(text, type){ msg.textContent=text; msg.className='msg '+type; }

// Deshabilitar botón hasta que la sesión de recovery esté lista
btn.disabled = true;
btn.textContent = 'Verificando enlace…';

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    btn.disabled = false;
    btn.textContent = 'Guardar contraseña';
  } else if (!session) {
    showMsg('Enlace inválido o expirado. Solicita uno nuevo.', 'bad');
    btn.disabled = true;
  }
});

btn.addEventListener('click', async () => {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  if(!p1 || p1.length < 6){ showMsg('La contraseña debe tener al menos 6 caracteres.','bad'); return; }
  if(p1 !== p2){ showMsg('Las contraseñas no coinciden.','bad'); return; }
  btn.disabled = true; btn.textContent = 'Guardando…';
  const { error } = await sb.auth.updateUser({ password: p1 });
  if(error){ showMsg(error.message,'bad'); btn.disabled=false; btn.textContent='Guardar contraseña'; return; }
  showMsg('¡Contraseña actualizada! Redirigiendo…','ok');
  setTimeout(() => { location.href = '/'; }, 2000);
});
</script>
</body>
</html>
