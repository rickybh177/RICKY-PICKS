<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Restablecer contraseña — RICKY PICKS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0d0d0d;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:32px;width:100%;max-width:400px}
  h2{font-size:22px;margin-bottom:8px}
  p{font-size:14px;color:#888;margin-bottom:24px}
  input{width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:12px 14px;color:#f0f0f0;font-size:15px;outline:none;margin-bottom:16px}
  input:focus{border-color:#4CAF50}
  button{width:100%;background:#4CAF50;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:14px;font-size:13px;text-align:center;padding:10px;border-radius:8px;display:none}
  .msg.ok{display:block;background:#1a3a1a;color:#4CAF50}
  .msg.bad{display:block;background:#3a1a1a;color:#f55}
  a{color:#4CAF50;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <h2>Nueva contraseña</h2>
  <p>Escribe tu nueva contraseña para acceder a RICKY PICKS.</p>
  <input type="password" id="pass1" placeholder="Nueva contraseña" autocomplete="new-password">
  <input type="password" id="pass2" placeholder="Confirmar contraseña" autocomplete="new-password">
  <button id="btn">Guardar contraseña</button>
  <div class="msg" id="msg"></div>
  <div style="text-align:center;margin-top:20px"><a href="/">← Volver al inicio</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://gftskpanqhtyxfvuneiz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmdHNrcGFucWh0eXhmdnVuZWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg2NTY2MTIsImV4cCI6MjA2NDIzMjYxMn0.ePCZPBnEkBNbDVk1oYaJ0jHh0q6YXrVOE2LyN3RFtF4';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

function showMsg(text, type){ msg.textContent=text; msg.className='msg '+type; }

// Supabase envía el token en el hash o como query param (PKCE)
(async () => {
  const hash = Object.fromEntries(new URLSearchParams(location.hash.slice(1)));
  const query = Object.fromEntries(new URLSearchParams(location.search));
  const code = query.code;
  if (code) {
    // PKCE flow
    const { error } = await sb.auth.exchangeCodeForSession(code);
    if (error) { showMsg('Enlace inválido o expirado. Solicita uno nuevo.', 'bad'); btn.disabled = true; }
  } else if (hash.access_token) {
    const { error } = await sb.auth.setSession({ access_token: hash.access_token, refresh_token: hash.refresh_token });
    if (error) { showMsg('Enlace inválido o expirado. Solicita uno nuevo.', 'bad'); btn.disabled = true; }
  } else {
    showMsg('Enlace inválido o expirado. Solicita uno nuevo.', 'bad'); btn.disabled = true;
  }
})();

btn.addEventListener('click', async () => {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  if(!p1 || p1.length < 6){ showMsg('La contraseña debe tener al menos 6 caracteres.','bad'); return; }
  if(p1 !== p2){ showMsg('Las contraseñas no coinciden.','bad'); return; }
  btn.disabled = true; btn.textContent = 'Guardando…';
  const { error } = await sb.auth.updateUser({ password: p1 });
  if(error){ showMsg(error.message,'bad'); btn.disabled=false; btn.textContent='Guardar contraseña'; return; }
  showMsg('¡Contraseña actualizada! Redirigiendo…','ok');
  setTimeout(() => { location.href = '/'; }, 2000);
});
</script>
</body>
</html>
